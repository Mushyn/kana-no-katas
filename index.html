<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kana no Katas — Apprendre les kanas japonais</title>
  <meta name="description" content="Jeu d'apprentissage des kanas japonais par glisser-déposer avec répétition espacée." />
  <meta name="theme-color" content="#A855F7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Kana no Katas" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">
  <div id="header">
    <h1>かな の 型</h1>
    <div id="mode-toggle">
      <button class="mode-btn active" onclick="setMode('both',this)">ひ+カ</button>
      <button class="mode-btn" onclick="setMode('hiragana',this)">ひ</button>
      <button class="mode-btn" onclick="setMode('katakana',this)">カ</button>
    </div>
  </div>

  <div id="score-bar">
    <span class="sp sp-ok"   id="s-ok">✓ 0</span>
    <span class="sp sp-err"  id="s-err">✗ 0</span>
    <span class="sp sp-left" id="s-left">◎ 0</span>
    <span class="sp sp-retry" id="s-retry" style="display:none">↺ 0</span>
    <button id="col-selector-btn" onclick="toggleColSelector()"><span id="col-selector-label">Colonnes ▾</span></button>
  </div>


  <!-- Panneau de sélection (masqué par défaut) -->
  <div id="col-selector-panel" style="display:none;">
    <div id="col-selector-header">
      <span>Choisir les colonnes</span>
      <div style="display:flex;gap:6px;">
        <button onclick="selectAllCols()">Toutes</button>
        <button onclick="selectNoneCols()">Aucune</button>
        <button class="btn-apply" onclick="applyColSelection()">Appliquer ✓</button>
      </div>
    </div>
    <div id="col-checkboxes"></div>
  </div>

  <div id="grid-zone">
    <div id="grid-scroll">
      <div id="grid"></div>
    </div>
  </div>

  <div id="divider"></div>

  <div id="card-zone">
    <div id="deck-controls">
      <label>Cartes :</label>
      <button class="dc-btn active" onclick="setDeckSize(1,this)">1/1</button>
      <button class="dc-btn" onclick="setDeckSize(5,this)">5/5</button>
      <button class="dc-btn" id="btnhint" onclick="toggleHints()">Romaji</button>
      <span id="diac-switch-group">
        <span id="diac-switch-label">Diacritiques</span>
        <button id="diac-switch" onclick="toggleDiacritics(this)" aria-pressed="false">
          <span class="rt-knob"></span>
        </button>
        <span id="diac-switch-state">off</span>
      </span>
    </div>
    <div id="msg"></div>
    <div id="deck-scroll"></div>
    <div id="actions">
      <button onclick="resetGame()" aria-label="Recommencer" title="Recommencer">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      </button>
      <button onclick="drawMore()" aria-label="Ajouter des cartes" title="Ajouter des cartes">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button onclick="showBilan()" aria-label="Bilan" title="Bilan">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      </button>
      <button onclick="window.location.href='trace.html'" aria-label="Tracé" title="Tracé">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/></svg>
      </button>
    </div>
  </div>

  <!-- Feedback erreur -->
  <div id="feedback">
    <div class="fb-char"   id="fb-char"></div>
    <div class="fb-romaji" id="fb-romaji"></div>
    <div class="fb-col"    id="fb-col"></div>
    <div class="fb-msg">↺ Reproposé dans ~15 cartes</div>
  </div>

  <!-- Bilan -->
  <div id="bilan">
    <h2>Bilan de session</h2>
    <div class="bilan-stats">
      <div class="bstat ok"><div class="val" id="b-ok">0</div><div class="lbl">Réussis</div></div>
      <div class="bstat err"><div class="val" id="b-err">0</div><div class="lbl">Erreurs</div></div>
      <div class="bstat pct"><div class="val" id="b-pct">—</div><div class="lbl">Réussite</div></div>
    </div>
    <div class="bilan-section" id="b-errors-section">
      <h3>À retravailler</h3>
      <div class="bilan-grid" id="b-errors"></div>
    </div>
    <div class="bilan-section">
      <h3>Maîtrisés</h3>
      <div class="bilan-grid" id="b-ok-grid"></div>
    </div>
    <button onclick="closeBilan()">← Continuer</button>
    <button onclick="window.location.href='trace.html'" class="bilan-trace-btn">✏️ S'entraîner au tracé</button>
    <button onclick="resetGame()">↺ Recommencer</button>
  </div>
</div>

<script src="data.js"></script>
<script src="game.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(r => console.log('SW OK', r.scope))
        .catch(e => console.warn('SW KO', e));
    });
  }
</script>
</body>
</html>
